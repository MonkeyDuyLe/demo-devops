name: DevOps_Final_Demo

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    [cite_start]runs-on: ubuntu-latest # Sử dụng hệ điều hành Linux [cite: 20]

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Kiem tra bao mat (DevSecOps)
        run: |
          echo "Đang quét lỗ hổng bảo mật..."
          sleep 5
          echo "Hệ thống an toàn."

      - name: 3. Chay Unit Test (CI)
        # Bước này sẽ fail nếu file index.html thiếu dấu }
        run: |
          echo "Đang kiểm tra cú pháp mã nguồn..."
          grep "}" index.html
          echo "Kiểm tra hoàn tất!"

      - name: 4. Dong goi Docker (Containerization)
        # Minh họa kỹ năng Docker trong JD [cite: 20]
        run: |
          echo "Đang đóng gói ứng dụng..."
          sleep 5
          echo "Docker Image đã sẵn sàng."

      - name: 5. Trien khai (CD)
        run: |
          echo "Đang cập nhật lên máy chủ..."
          sleep 5
          echo "TRIỂN KHAI THÀNH CÔNG!"
