# 1. Tên của đường ống (Pipeline)
name: DevOps_Demo_Pipeline

# 2. Điều kiện kích hoạt: Tự động chạy mỗi khi bạn 'push' code lên nhánh main 
on:
  push:
    branches: [ "main" ]

# 3. Các công việc cần làm trong đường ống
jobs:
  build-and-test:
    # Chạy trên hệ điều hành Linux (kỹ năng bắt buộc của DevOps) 
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Lấy mã nguồn từ GitHub về máy chủ ảo
      - name: Checkout Code
        uses: actions/checkout@v4

      # Bước 2: Mô phỏng quá trình Kiểm thử (CI) 
      - name: Run Unit Tests
        run: |
          echo "Đang kiểm tra lỗi cú pháp..."
          sleep 2
          echo "Kiểm tra hoàn tất: Không có lỗi!"
      - name: 3. Chay Unit Test (CI)
        run: |
          echo "Dang kiem tra cú pháp code..."
          # Lệnh này sẽ kiểm tra xem trong file index.html có dấu '}' không
          grep "}" index.html
          echo "Code hop le!"

      # Bước 3: Mô phỏng đóng gói Docker (Containerization) 
      - name: Build Docker Image
        run: |
          echo "Đang đóng gói ứng dụng vào Docker Container..."
          sleep 2
          echo "Docker Image 'my-web-app:v1' đã sẵn sàng."

      # Bước 4: Mô phỏng triển khai lên Cloud (CD) [cite: 11, 13]
      - name: Deploy to Server
        run: |
          echo "Đang kết nối tới AWS/GCP qua SSH..."
          sleep 3
          echo "Triển khai thành công ứng dụng phiên bản mới!"
