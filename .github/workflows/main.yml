name: DevOps_Final_Demo

on:
  push:
    branches: [ "main" ]

jobs:
  devops-workflow:
    # Yêu cầu thành thạo Linux [cite: 20]
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Kiem tra bao mat (DevSecOps)
        # Tích hợp kiểm tra bảo mật sớm [cite: 15]
        run: |
          echo "Dang quet lo hong bao mat..."
          sleep 5
          echo "Ket qua: He thong an toan."

      - name: 3. Chay Unit Test (CI)
        # Quản lý Pipeline CI/CD 
        run: |
          echo "Dang kiem tra cu phap CSS trong file index.html..."
          if grep "background-color" index.html | grep -q "}"; then
            echo "Thanh cong: Tim thay dau ngoac nhon '}'."
          else
            echo "LOI NGHIEM TRONG: Thieu dau ngoac nhon '}' tai dong cau hinh mau sac!"
            exit 1
          fi

      - name: 4. Dong goi Docker (Containerization)
        # Minh họa kỹ năng Docker & Container [cite: 13, 20]
        run: |
          echo "Dang build Docker Image 'web-app:v1'..."
          sleep 8
          echo "Build thanh cong!"

      - name: 5. Trien khai Cloud & Toi uu (CD)
        # Triển khai và tối ưu hóa tài nguyên Cloud [cite: 13, 16]
        run: |
          echo "Dang cau hinh Load Balancer va trien khai len Cloud..."
          sleep 5
          echo "=== TRIEN KHAI HOAN TAT TREN PRODUCTION ==="
