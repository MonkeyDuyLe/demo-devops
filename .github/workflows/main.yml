name: DevOps_Final_Demo

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    # Chạy trên môi trường Linux (Yêu cầu kỹ thuật quan trọng) [cite: 20]
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Kiem tra bao mat (DevSecOps)
        # Tích hợp kiểm tra bảo mật sớm [cite: 15]
        run: |
          echo "Dang quet lo hong bao mat..."
          sleep 8
          echo "Ket qua: He thong an toan."

      - name: 3. Chay Unit Test (CI)
        run: |
          echo "Dang kiem tra cu phap CSS..."
          # Kiểm tra dòng background-color phải có dấu ; và } ở cuối
          if grep "background-color" index.html | grep -q "}"; then
            echo "Code hop le!"
          else
            echo "LOI: Thieu dau ngoac nhon '}' o dong cau hinh mau sac!"
            exit 1
          fi

      - name: 4. Dong goi Docker (Containerization)
        # Minh hoa ky nang quan ly Container [cite: 13, 20]
        run: |
          echo "Dang dong goi ung dung vao Docker..."
          sleep 12
          echo "Docker Image da san sang."

      - name: 5. Trien khai Cloud (CD)
        # Triển khai ứng dụng lên nền tảng đám mây [cite: 11, 13]
        run: |
          echo "Dang cau hinh Load Balancer va trien khai len Cloud..."
          sleep 10
          echo "=== TRIEN KHAI HOAN TAT ==="
