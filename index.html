<!DOCTYPE html>
<html lang="vi">
<head>

    <style>
        body {
            /* Bước demo: Đổi 'skyblue' thành 'orange' hoặc 'red' để kích hoạt pipeline */
            background-color: skyblue;

            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;

    <div class="card">
        <h1>Hệ thống: Đã cập nhật thành công!</h1>
        <p>Trạng thái: <strong>Hoạt động ổn định</strong></p>

</html>
